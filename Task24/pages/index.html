<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Основи JavaScript</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>

<body class="page-body">
    <main class="main-container">
        <h1 class="page-title">Практика JavaScript</h1>

        <section class="task-section">
            <h2 id="greeting-output" class="output-title">Введіть своє ім'я</h2>
            <div class="input-group">
                <input type="text" id="name-input" class="text-input" placeholder="Ваше ім'я">
                <button id="name-btn" class="action-btn">Привітатися</button>
            </div>
        </section>

        <section class="task-section">
            <h2 id="age-output" class="output-title">Дізнатися вік</h2>
            <div class="input-group">
                <input type="number" id="year-input" class="text-input" placeholder="Рік народження">
                <button id="age-btn" class="action-btn">Порахувати</button>
            </div>
        </section>

        <section class="task-section">
            <h2 id="perimeter-output" class="output-title">Периметр квадрата</h2>
            <div class="input-group">
                <input type="number" id="side-input" class="text-input" placeholder="Сторона (см)">
                <button id="perimeter-btn" class="action-btn">Обчислити</button>
            </div>
        </section>

        <section class="task-section">
            <h2 id="area-output" class="output-title">Площа кола</h2>
            <div class="input-group">
                <input type="number" id="radius-input" class="text-input" placeholder="Радіус (см)">
                <button id="area-btn" class="action-btn">Обчислити</button>
            </div>
        </section>

        <section class="task-section">
            <h2 id="speed-output" class="output-title">Швидкість руху</h2>
            <div class="input-group">
                <input type="number" id="distance-input" class="text-input" placeholder="Відстань (км)">
                <input type="number" id="time-input" class="text-input" placeholder="Час (год)">
                <button id="speed-btn" class="action-btn">Обчислити</button>
            </div>
        </section>

        <section class="task-section">
            <h2 id="currency-output" class="output-title">Конвертер валют</h2>
            <div class="input-group">
                <input type="number" id="usd-input" class="text-input" placeholder="Сума в USD">
                <button id="currency-btn" class="action-btn">В EUR</button>
            </div>
        </section>
    </main>

    <script defer src="../scripts/script.js"></script>
</body>

</html>
