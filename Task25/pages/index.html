<!DOCTYPE html>
<html lang="en
<head>
    <meta charset=" UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Математика та Оператори в JS</title>
<link rel="stylesheet" href="../styles/style.css">
</head>

<body class="page-body">
    <main class="main-container">
        <h1 class="page-title">Математика та Логіка</h1>

        <section class="task-section">
            <h2 id="float-output" class="output-title">Додавання 0.1 та 0.2</h2>
            <div class="input-group">
                <button id="float-btn" class="action-btn">Показати результат</button>
            </div>
        </section>

        <section class="task-section">
            <h2 id="string-math-output" class="output-title">Додавання рядка "1" і цифри 2</h2>
            <div class="input-group">
                <button id="string-math-btn" class="action-btn">Додати математично</button>
            </div>
        </section>

        <section class="task-section">
            <h2 id="flash-drive-output" class="output-title">Розрахунок місця на флешці</h2>
            <div class="input-group">
                <input type="number" id="gb-input" class="text-input" placeholder="Обсяг флешки (Гб)">
                <button id="flash-drive-btn" class="action-btn">Порахувати файли</button>
            </div>
        </section>

        <section class="task-section">
            <h2 id="chocolate-output" class="output-title">Покупка шоколадок</h2>
            <div class="input-group">
                <input type="number" id="money-input" class="text-input" placeholder="Сума в гаманці (грн)">
                <input type="number" id="price-input" class="text-input" placeholder="Ціна шоколадки (грн)">
                <button id="chocolate-btn" class="action-btn">Купити</button>
            </div>
        </section>

        <section class="task-section">
            <h2 id="reverse-output" class="output-title">Переворот числа</h2>
            <div class="input-group">
                <input type="number" id="number-input" class="text-input" placeholder="Тризначне число">
                <button id="reverse-btn" class="action-btn">Перевернути</button>
            </div>
        </section>

        <section class="task-section">
            <h2 id="deposit-output" class="output-title">Банківський депозит (5% річних на 2 міс.)</h2>
            <div class="input-group">
                <input type="number" id="deposit-input" class="text-input" placeholder="Сума вкладу">
                <button id="deposit-btn" class="action-btn">Порахувати відсотки</button>
            </div>
        </section>

        <section class="task-section">
            <h2 id="logic-output" class="output-title">Що повернуть вирази?</h2>
            <div class="input-group">
                <button id="logic-btn" class="action-btn">Виконати вирази</button>
            </div>
        </section>
    </main>

    <script src="../scripts/script.js"></script>
</body>

</html>
